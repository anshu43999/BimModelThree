<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Fragments BIM Mobile Viewer</title>
    <link rel="stylesheet" href="./mobile.css">
</head>
<body>
<main class="mobileApp">
    <section class="mobileViewport">
        <canvas id="viewerCanvas"></canvas>
        <div class="topBar">
            <div class="brandText">
                <strong>BIM Mobile</strong>
                <span id="statusText">Ready</span>
            </div>
            <div class="topActions">
                <label class="roundBtn" title="閫夋嫨 .frag">
                    <span>閫夋嫨鏂囦欢</span>
                    <input id="fragFile" type="file" accept=".frag">
                </label>
                <button id="openLoadBtn" class="roundBtn primaryRoundBtn" type="button">鍔犺浇妯″瀷</button>
            </div>
        </div>

        <div class="modelHud">
            <div>
                <span>妯″瀷</span>
                <strong id="modelName">鏈姞杞?/strong>
            </div>
            <div>
                <span>鏋勪欢</span>
                <strong id="itemCount">-</strong>
            </div>
            <div>
                <span>閫変腑</span>
                <strong id="selectedCount">-</strong>
            </div>
        </div>

        <nav class="quickTools" aria-label="绉诲姩绔ā鍨嬪伐鍏?>
            <button id="fitBtn" type="button" disabled>FIT</button>
            <button id="isoBtn" type="button" disabled>ISO</button>
            <button id="topBtn" type="button" disabled>TOP</button>
            <button id="treeBtn" type="button" disabled>鏍?/button>
            <button id="infoBtn" type="button">淇℃伅</button>
        </nav>
    </section>

    <section id="loadSheet" class="overlaySheet" hidden>
        <div class="sheetScrim" data-close-load></div>
        <div class="loadPanel">
            <div class="sheetHandle"></div>
            <div class="sheetHeader">
                <div>
                    <strong>鍔犺浇妯″瀷</strong>
                    <span>.frag 鏂囦欢鎴栭」鐩唴璺緞</span>
                </div>
                <button class="textBtn" type="button" data-close-load>鍏抽棴</button>
            </div>
            <div class="loadForm">
                <input id="fragUrl" type="text" value="" placeholder="http://127.0.0.1:5175/models/model.frag" aria-label="妯″瀷璺緞">
                <button id="loadUrlBtn" class="primaryBtn" type="button">鍔犺浇璺緞</button>
            </div>
        </div>
    </section>

    <section id="bottomSheet" class="bottomSheet">
        <div class="sheetHandle"></div>
        <div class="sheetTabs" role="tablist" aria-label="绉诲姩绔俊鎭潰鏉?>
            <button class="active" type="button" data-tab="info">鏋勪欢淇℃伅</button>
            <button type="button" data-tab="tree">妯″瀷鏍?/button>
            <button type="button" data-tab="tools">鎿嶄綔</button>
            <button type="button" data-tab="log">鏃ュ織</button>
        </div>

        <div class="sheetBody">
            <section class="sheetPane active" data-pane="info">
                <div class="mobileStartPanel" id="mobileStartPanel">
                    <strong>鍔犺浇 BIM 妯″瀷</strong>
                    <span>閫夋嫨鏈湴 .frag 鏂囦欢锛屾垨鍔犺浇椤圭洰鍐呴粯璁ゆā鍨嬨€?/span>
                    <div class="startActions">
                        <label class="startBtn">
                            <span>閫夋嫨 .frag</span>
                            <input id="sheetFragFile" type="file" accept=".frag">
                        </label>
                        <button id="sheetOpenLoadBtn" class="startBtn primaryStartBtn" type="button">鍔犺浇璺緞</button>
                    </div>
                </div>
                <div class="emptyState" id="infoEmpty">鐐瑰嚮妯″瀷鏋勪欢鍚庡睍绀哄熀纭€淇℃伅</div>
                <dl id="basicProps" class="propsList"></dl>
                <div id="attributeList" class="attributeList"></div>
            </section>

            <section class="sheetPane" data-pane="tree">
                <div class="treeTabs" role="tablist" aria-label="妯″瀷鏍戝垎绫?>
                    <button class="active" type="button" data-tree-tab="models">models</button>
                    <button type="button" data-tree-tab="objects">objects</button>
                    <button type="button" data-tree-tab="classes">classes</button>
                    <button type="button" data-tree-tab="storeys">storeys</button>
                </div>
                <div id="treeEmpty" class="emptyState">鍔犺浇妯″瀷鍚庡睍绀烘ā鍨嬫爲</div>
                <div id="modelTree" class="treeList"></div>
            </section>

            <section class="sheetPane" data-pane="tools">
                <div class="toolGrid">
                    <button id="locateBtn" type="button" disabled>瀹氫綅</button>
                    <button id="hideBtn" type="button" disabled>闅愯棌</button>
                    <button id="isolateBtn" type="button" disabled>闅旂</button>
                    <button id="showAllBtn" type="button" disabled>鍏ㄩ儴鏄剧ず</button>
                    <button id="colorBtn" type="button" disabled>鐫€鑹?/button>
                    <button id="resetColorBtn" type="button" disabled>閲嶇疆</button>
                    <button id="snapshotBtn" type="button" disabled>蹇収</button>
                    <button id="fullscreenBtn" type="button">鍏ㄥ睆</button>
                </div>
                <label class="rangeRow">
                    <span>閫忔槑搴?/span>
                    <input id="opacityInput" type="range" min="0.12" max="1" step="0.02" value="1" disabled>
                    <strong id="opacityValue">100%</strong>
                </label>
            </section>

            <section class="sheetPane" data-pane="log">
                <pre id="log"></pre>
            </section>
        </div>
    </section>
</main>

<script type="importmap">
{
  "imports": {
    "three": "../node_modules/three/build/three.module.js",
    "three/addons/": "../node_modules/three/examples/jsm/",
    "three/examples/jsm/": "../node_modules/three/examples/jsm/",
    "web-ifc": "../node_modules/web-ifc/web-ifc-api.js",
    "@thatopen/fragments": "../node_modules/@thatopen/fragments/dist/index.mjs"
  }
}
</script>
<script type="module" src="./mobile-main.js"></script>
</body>
</html>
