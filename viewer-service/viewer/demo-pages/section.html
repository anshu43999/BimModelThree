    <title>基础剖切</title>
    <link rel="stylesheet" href="./common.css">
</head>
<body>
<main class="page">
    <div class="viewer"><canvas id="viewerCanvas"></canvas></div>
    <section class="panel compact">
        <div class="title">
            <div class="eyebrow">REQ-008</div>
            <h1>基础剖切</h1>
            <p>只实现单剖切面、轴向切换、前后移动和清除。</p>
        </div>
        <select id="axisSelect">
            <option value="x">X 轴</option>
            <option value="y">Y 轴</option>
            <option value="z">Z 轴</option>
        </select>
        <div class="actions">
            <button id="enableBtn" type="button">开启剖切</button>
            <button id="minusBtn" type="button">后移</button>
            <button id="plusBtn" type="button">前移</button>
            <button id="clearBtn" type="button">清除</button>
        </div>
        <div id="status" class="status">准备加载</div>
    </section>
</main>
