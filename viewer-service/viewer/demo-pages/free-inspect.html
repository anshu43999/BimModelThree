<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自由巡检</title>
    <link rel="stylesheet" href="./common.css">
</head>
<body>
<main class="page">
    <div class="viewer"><canvas id="viewerCanvas" tabindex="0"></canvas></div>
    <section class="panel compact">
        <div class="title">
            <div class="eyebrow">REQ-010</div>
            <h1>自由巡检</h1>
            <p>独立验证 WASD 平移、Shift 加速和移动步进。</p>
        </div>
        <div class="actions">
            <button id="toggleInspectBtn" type="button">开启巡检</button>
            <button id="fitBtn" type="button">适配模型</button>
            <button id="isoBtn" type="button">等轴视图</button>
        </div>
        <label class="field">
            <span>移动步进 <strong id="speedValue">0.2x</strong></span>
            <input id="speedInput" type="range" min="0.2" max="3" step="0.1" value="0.2">
        </label>
        <div class="keyGrid" aria-label="移动按键">
            <span></span><kbd>W</kbd><span></span>
            <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
        </div>
        <div id="status" class="status">准备加载</div>
    </section>
    <div class="badge">Ctrl + 左键拖动原地转向 · WASD 移动 · Shift 加速</div>
</main>
<script type="importmap">
{"imports":{"three":"../../node_modules/three/build/three.module.js","three/addons/":"../../node_modules/three/examples/jsm/","three/examples/jsm/":"../../node_modules/three/examples/jsm/","@thatopen/fragments":"../../node_modules/@thatopen/fragments/dist/index.mjs","web-ifc":"../../node_modules/web-ifc/web-ifc-api.js"}}
</script>
<script type="module" src="./free-inspect.js"></script>
</body>
</html>
