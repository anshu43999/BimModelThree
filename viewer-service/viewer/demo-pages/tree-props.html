<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模型树与属性查看</title>
    <link rel="stylesheet" href="./common.css">
</head>
<body>
<main class="page">
    <div class="viewer"><canvas id="viewerCanvas"></canvas></div>
    <section class="panel">
        <div class="title">
            <div class="eyebrow">REQ-002</div>
            <h1>模型树与属性查看</h1>
            <p>按类型切换模型树，展开节点时懒加载子节点，点击节点后定位并高亮对应模型构件。</p>
        </div>
        <div class="treeTabs" role="tablist" aria-label="模型树类型">
            <button type="button" class="active" data-tree-tab="models">models</button>
            <button type="button" data-tree-tab="objects">objects</button>
            <button type="button" data-tree-tab="classes">classes</button>
            <button type="button" data-tree-tab="storeys">storeys</button>
        </div>
        <div id="treeList" class="demoTree"></div>
        <div id="props" class="status">请选择树节点</div>
        <div id="status" class="status">准备加载</div>
    </section>
</main>

</html>
