<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Fragments BIM Mobile Viewer</title>
    <link rel="stylesheet" href="./mobile.css">
</head>
<body>
<main class="mobileApp">
    <section class="mobileViewport">
        <canvas id="viewerCanvas"></canvas>
        <div class="topBar">
            <div class="brandText">
                <strong>BIM Mobile</strong>
                <span id="statusText">Ready</span>
            </div>
            <div class="topActions">
                <label class="roundBtn" title="选择 .frag">
                    <span>选择文件</span>
                    <input id="fragFile" type="file" accept=".frag">
                </label>
                <button id="openLoadBtn" class="roundBtn primaryRoundBtn" type="button">加载模型</button>
            </div>
        </div>

        <div class="modelHud">
            <div>
                <span>模型</span>
                <strong id="modelName">未加载</strong>
            </div>
            <div>
                <span>构件</span>
                <strong id="itemCount">-</strong>
            </div>
            <div>
                <span>选中</span>
                <strong id="selectedCount">-</strong>
            </div>
        </div>

        <nav class="quickTools" aria-label="移动端模型工具">
            <button id="fitBtn" type="button" disabled>FIT</button>
            <button id="isoBtn" type="button" disabled>ISO</button>
            <button id="topBtn" type="button" disabled>TOP</button>
            <button id="treeBtn" type="button" disabled>树</button>
            <button id="infoBtn" type="button">信息</button>
        </nav>
    </section>

    <section id="loadSheet" class="overlaySheet" hidden>
        <div class="sheetScrim" data-close-load></div>
        <div class="loadPanel">
            <div class="sheetHandle"></div>
            <div class="sheetHeader">
                <div>
                    <strong>加载模型</strong>
                    <span>.frag 文件或项目内路径</span>
                </div>
                <button class="textBtn" type="button" data-close-load>关闭</button>
            </div>
            <div class="loadForm">
                <input id="fragUrl" type="text" value="../output/20210219.frag" aria-label="模型路径">
                <button id="loadUrlBtn" class="primaryBtn" type="button">加载路径</button>
            </div>
        </div>
    </section>

    <section id="bottomSheet" class="bottomSheet">
        <div class="sheetHandle"></div>
        <div class="sheetTabs" role="tablist" aria-label="移动端信息面板">
            <button class="active" type="button" data-tab="info">构件信息</button>
            <button type="button" data-tab="tree">模型树</button>
            <button type="button" data-tab="tools">操作</button>
            <button type="button" data-tab="log">日志</button>
        </div>

        <div class="sheetBody">
            <section class="sheetPane active" data-pane="info">
                <div class="mobileStartPanel" id="mobileStartPanel">
                    <strong>加载 BIM 模型</strong>
                    <span>选择本地 .frag 文件，或加载项目内默认模型。</span>
                    <div class="startActions">
                        <label class="startBtn">
                            <span>选择 .frag</span>
                            <input id="sheetFragFile" type="file" accept=".frag">
                        </label>
                        <button id="sheetOpenLoadBtn" class="startBtn primaryStartBtn" type="button">加载路径</button>
                    </div>
                </div>
                <div class="emptyState" id="infoEmpty">点击模型构件后展示基础信息</div>
                <dl id="basicProps" class="propsList"></dl>
                <div id="attributeList" class="attributeList"></div>
            </section>

            <section class="sheetPane" data-pane="tree">
                <div class="treeTabs" role="tablist" aria-label="模型树分类">
                    <button class="active" type="button" data-tree-tab="models">models</button>
                    <button type="button" data-tree-tab="objects">objects</button>
                    <button type="button" data-tree-tab="classes">classes</button>
                    <button type="button" data-tree-tab="storeys">storeys</button>
                </div>
                <div id="treeEmpty" class="emptyState">加载模型后展示模型树</div>
                <div id="modelTree" class="treeList"></div>
            </section>

            <section class="sheetPane" data-pane="tools">
                <div class="toolGrid">
                    <button id="locateBtn" type="button" disabled>定位</button>
                    <button id="hideBtn" type="button" disabled>隐藏</button>
                    <button id="isolateBtn" type="button" disabled>隔离</button>
                    <button id="showAllBtn" type="button" disabled>全部显示</button>
                    <button id="colorBtn" type="button" disabled>着色</button>
                    <button id="resetColorBtn" type="button" disabled>重置</button>
                    <button id="snapshotBtn" type="button" disabled>快照</button>
                    <button id="fullscreenBtn" type="button">全屏</button>
                </div>
                <label class="rangeRow">
                    <span>透明度</span>
                    <input id="opacityInput" type="range" min="0.12" max="1" step="0.02" value="1" disabled>
                    <strong id="opacityValue">100%</strong>
                </label>
            </section>

            <section class="sheetPane" data-pane="log">
                <pre id="log"></pre>
            </section>
        </div>
    </section>
</main>

<script type="importmap">
{
  "imports": {
    "three": "../node_modules/three/build/three.module.js",
    "three/addons/": "../node_modules/three/examples/jsm/",
    "three/examples/jsm/": "../node_modules/three/examples/jsm/",
    "web-ifc": "../node_modules/web-ifc/web-ifc-api.js",
    "@thatopen/fragments": "../node_modules/@thatopen/fragments/dist/index.mjs"
  }
}
</script>
<script type="module" src="./mobile-main.js"></script>
</body>
</html>
